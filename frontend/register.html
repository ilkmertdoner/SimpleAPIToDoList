<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        .theme-transition {
            transition: background-color 0.2s smooth, color 0.2s smooth;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body
    class="theme-transition bg-slate-50 dark:bg-[#121212] text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 font-sans relative">

    <button onclick="toggleTheme()"
        class="absolute top-4 right-4 p-2 rounded-xl bg-slate-200 dark:bg-slate-800 hover:ring-2 hover:ring-blue-500 transition-all z-10">
        <span id="themeIcon" class="text-xl inline-block">🌙</span>
    </button>

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1
                class="text-3xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent inline-block">
                Yapılacaklar Listesi
            </h1>
        </div>

        <div id="registerContainer"
            class="theme-transition bg-white dark:bg-[#1e1e1e] border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Kayıt Ol</h2>

            <div class="space-y-5">
                <div class="form-group">
                    <label class="block text-sm font-semibold mb-2 text-slate-600 dark:text-slate-400">Kullanıcı
                        Adı</label>
                    <input type="text" id="reg-username"
                        class="theme-transition w-full bg-slate-50 dark:bg-[#2c2c2c] border border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        placeholder="Kullanıcı adı belirle">
                </div>

                <div class="form-group">
                    <label class="block text-sm font-semibold mb-2 text-slate-600 dark:text-slate-400">E-posta</label>
                    <input type="email" id="reg-email"
                        class="theme-transition w-full bg-slate-50 dark:bg-[#2c2c2c] border border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        placeholder="E-posta adresini gir">
                </div>

                <div class="form-group">
                    <label class="block text-sm font-semibold mb-2 text-slate-600 dark:text-slate-400">Şifre</label>
                    <input type="password" id="reg-password"
                        class="theme-transition w-full bg-slate-50 dark:bg-[#2c2c2c] border border-slate-200 dark:border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        placeholder="Şifre belirle">
                </div>

                <button onclick="registerUser()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-500/20 transition-all active:scale-95 mt-2">
                    KAYIT OL
                </button>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
                    <span class="flex-shrink-0 mx-4 text-slate-400 text-sm">veya</span>
                    <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
                </div>

                <div class="flex flex-col gap-3">
                    <div id="googleButtonContainer" class="w-full h-[40px] overflow-hidden rounded-[4px]"></div>
                    <button onclick="registerWithMicrosoft()"
                        class="theme-transition w-full flex items-center justify-center gap-3 bg-white dark:bg-[#131314] border border-slate-300 dark:border-[#8e918f] rounded-[4px] h-[40px] px-3 text-[14px] font-medium text-[#3c4043] dark:text-[#e3e3e3] hover:bg-slate-50 dark:hover:bg-[#2b2b2b] transition-all shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 21 21">
                            <path fill="#f25022" d="M1 1h9v9H1z" />
                            <path fill="#00a4ef" d="M1 11h9v9H1z" />
                            <path fill="#7fba00" d="M11 1h9v9h-9z" />
                            <path fill="#ffb900" d="M11 11h9v9h-9z" />
                        </svg>
                        Microsoft ile Kayıt Ol
                    </button>
                </div>
            </div>

            <div class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
                Zaten hesabın var mı?
                <a href="login.html" class="text-blue-500 hover:text-blue-600 font-bold hover:underline transition-all">
                    Giriş Yap
                </a>
            </div>
        </div>

        <div id="verifyContainer"
            class="hidden theme-transition bg-white dark:bg-[#1e1e1e] border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold mb-2 text-center text-emerald-600 dark:text-emerald-400">E-Posta Doğrulama
            </h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 text-center mb-8">E-posta adresinize gönderdiğimiz 6
                haneli kodu giriniz.</p>

            <div class="space-y-6">
                <div class="form-group">
                    <input type="text" id="verify-code" maxlength="6"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        class="theme-transition w-full bg-slate-50 dark:bg-[#2c2c2c] border border-slate-200 dark:border-slate-700 rounded-xl p-4 outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-center text-4xl tracking-[0.5em] font-black text-slate-800 dark:text-white uppercase"
                        placeholder="______">
                </div>

                <button onclick="verifyCode()"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-emerald-500/20 transition-all active:scale-95 mt-2">
                    DOĞRULA
                </button>
            </div>

            <div class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
                Kodu almadınız mı?
                <button onclick="location.reload()"
                    class="text-emerald-500 hover:text-emerald-600 font-bold hover:underline transition-all outline-none">
                    Başa Dön ve Tekrar Dene
                </button>
            </div>
        </div>

    </div>

    <script src="auth.js"></script>
</body>

</html>
