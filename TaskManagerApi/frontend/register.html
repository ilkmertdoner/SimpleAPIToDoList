<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container-center">
        <div class="card">
            <h2 style="text-align:center; margin-bottom:20px;">Hesap Oluştur</h2>

            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="reg-username" class="form-control" placeholder="Kullanıcı Adı Giriniz">
            </div>

            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="reg-password" class="form-control" placeholder="********">
            </div>

            <button onclick="register()" class="btn btn-primary">KAYIT OL</button>

            <div class="text-center">
                Zaten hesabın var mı? <a href="login.html">Giriş Yap</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
